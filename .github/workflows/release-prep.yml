name: Release Prep (Distribution Repo)

on:
  push:
    branches: ["main"]
    paths:
      - "releases/v*/**"
      - "CHANGELOG.md"
      - ".github/workflows/release-prep.yml"
      - "scripts/prepare_release.py"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version to prepare (X.Y.Z). Leave empty to auto-detect newest releases/vX.Y.Z."
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-prep-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PDF dependency
        run: |
          python -m pip install -U pip
          python -m pip install reportlab

      - name: Prepare release (checksums/latest/manifest + changelog PDF)
        shell: bash
        run: |
          set -euo pipefail
          args=(--root . --generate-changelog-pdf)
          if [[ -n "${{ inputs.version }}" ]]; then
            args+=(--version "${{ inputs.version }}")
          fi
          python scripts/prepare_release.py "${args[@]}"

      - name: Commit updated release metadata
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add releases docs CHANGELOG.md
          v="$(cat releases/latest/VERSION 2>/dev/null || true)"
          if [[ -n "$v" ]]; then
            git commit -m "docs: prepare v${v}"
          else
            git commit -m "docs: prepare distribution metadata"
          fi
          git push
