name: Release Prep (Distribution Repo)

on:
  push:
    branches: ["main"]
    paths:
      - "releases/v*/**"
      - "CHANGELOG.md"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version to prepare (X.Y.Z). Leave empty to auto-detect newest releases/vX.Y.Z."
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-prep-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install PDF dependency
        run: |
          python -m pip install -U pip
          python -m pip install reportlab

      - name: Detect release version (if not provided)
        id: detect
        shell: bash
        run: |
          set -euo pipefail
          VERSION_INPUT="${{ inputs.version }}"
          if [[ -n "${VERSION_INPUT}" ]]; then
            echo "version=${VERSION_INPUT}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Try to infer from changed paths first (push event).
          if [[ "${{ github.event_name }}" == "push" ]]; then
            CHANGED="$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" || true)"
            VERS="$(echo "$CHANGED" | sed -n 's#^releases/v\\([0-9][0-9.]*\\)/.*#\\1#p' | sort -u)"
            if [[ -n "$VERS" ]]; then
              echo "version=$(echo "$VERS" | tail -n 1)" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          # Fallback: newest version folder.
          V="$(ls -1 releases 2>/dev/null | sed -n 's/^v\\([0-9][0-9.]*\\)$/\\1/p' | sort -V | tail -n 1)"
          if [[ -z "$V" ]]; then
            echo "Could not detect a release version under releases/vX.Y.Z" >&2
            exit 1
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - name: Prepare release (checksums/latest/manifest + changelog PDF)
        run: |
          python scripts/prepare_release.py \
            --root . \
            --version "${{ steps.detect.outputs.version }}" \
            --generate-changelog-pdf

      - name: Commit updated release metadata
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add releases docs CHANGELOG.md
          git commit -m "docs: prepare v${{ steps.detect.outputs.version }}"
          git push

